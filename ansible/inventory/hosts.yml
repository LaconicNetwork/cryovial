---
all:
  children:
    deploy:
      hosts:
        urbit-ship:
          ansible_host: 10.5.5.4
          ansible_user: rix
          ansible_ssh_common_args: '-o ForwardAgent=yes'
          container_name: compose-urbit-fake-ship-1
          # Pier path is derived in the playbook from deployment_dir/data/urbit_data/zod.
          # If compose uses a named Docker volume instead of a bind mount,
          # update the playbook's pier_data_dir to match.
          lens_port: "12321"
          eyre_port: "8080"
          desk_name: zenith
          zenith_desk_repo: git@github.com:Zenith-Foundation/zenith-desk.git
          zenith_desk_branch: afd/wallet-integration
          urbit_repo: git@github.com:urbit/urbit.git
          urbit_branch: master
