---
# Install cryovial as a systemd service via uv tool install.
#
# Required variables: cryovial_service_user, cryovial_service_user_home,
# cryovial_service_secret, cryovial_service_services.

- name: Check if uv is installed
  ansible.builtin.command: uv --version
  register: cryovial_service_uv_check
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ cryovial_service_user }}"

- name: Install uv
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: "0755"
  when: cryovial_service_uv_check.rc != 0
  become: true
  become_user: "{{ cryovial_service_user }}"

- name: Run uv installer
  ansible.builtin.command: /tmp/uv-install.sh
  when: cryovial_service_uv_check.rc != 0
  become: true
  become_user: "{{ cryovial_service_user }}"
  changed_when: true

- name: Install cryovial via uv tool install
  ansible.builtin.command: >
    {{ cryovial_service_user_home }}/.local/bin/uv tool install
    --force --reinstall
    git+https://github.com/LaconicNetwork/cryovial.git@main
  become: true
  become_user: "{{ cryovial_service_user }}"
  changed_when: true

- name: Create /etc/cryovial directory
  ansible.builtin.file:
    path: /etc/cryovial
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Template /etc/cryovial/env
  ansible.builtin.template:
    src: env.j2
    dest: /etc/cryovial/env
    owner: "{{ cryovial_service_user }}"
    group: "{{ cryovial_service_user }}"
    mode: "0600"
  become: true
  notify: Restart cryovial

- name: Template /etc/cryovial/services.yml
  ansible.builtin.template:
    src: services.yml.j2
    dest: /etc/cryovial/services.yml
    owner: "{{ cryovial_service_user }}"
    group: "{{ cryovial_service_user }}"
    mode: "0644"
  become: true
  notify: Restart cryovial

- name: Template cryovial systemd unit
  ansible.builtin.template:
    src: cryovial.service.j2
    dest: /etc/systemd/system/cryovial.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify:
    - Reload systemd
    - Restart cryovial

- name: Enable cryovial service
  ansible.builtin.systemd:
    name: cryovial
    enabled: true
    daemon_reload: true
  become: true
